<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Form</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }
body {
  background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}





    .form-container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.2);
      border-top: 6px solid #30eae6;
    }

    h1 {
      text-align: center;
      color: #ff6600;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    div {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      transition: 0.3s ease;
      font-size: 15px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #ff6600;
      box-shadow: 0 0 6px rgba(255, 102, 0, 0.4);
      background-color: #fff;
      outline: none;
    }

    h2 {
      color: #ff6600;
      font-size: 18px;
      margin-bottom: 8px;
    }

    input[type="radio"],
    input[type="checkbox"] {
      accent-color: #ff6600;
      margin-right: 6px;
      transform: scale(1.1);
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 12px 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: #e25600;
      box-shadow: 0px 5px 12px rgba(255, 102, 0, 0.4);
      transform: scale(1.02);
    }

    @media (max-width: 500px) {
      .form-container {
        width: 90%;
        padding: 25px;
      }
    }
  </style>
</head>

<body>
  <div class="form-container">
    <h1>Forms in HTML</h1>

    <form action="/submit.php">
      <div>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter Name" required>
      </div>

      <div>
        <label for="phone">Phone</label>
        <input id="phone" type="tel" placeholder="Enter Phone Number" required>
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter Email" required>
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter Password" required>
      </div>

      <div>
        <label for="dob">Date of Birth</label>
        <input id="dob" type="date" required>
      </div>

      <div>
        <label for="gender">Gender</label>
        <select name="gender" id="gender" required>
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="others">Others</option>
        </select>
      </div>

      <div>
        <h2>Subscription Plan</h2>
        <input id="basic" type="radio" name="subscription" value="basic">
        <label for="basic">Basic</label>
        <input id="medium" type="radio" name="subscription" value="medium">
        <label for="medium">Medium</label>
        <input id="premium" type="radio" name="subscription" value="premium">
        <label for="premium">Premium</label>
      </div>

      <div>
        <input id="terms" type="checkbox" required>
        <label for="terms">I agree to terms and conditions</label>
      </div>

      <div>
        <label for="comments">Comments</label>
        <textarea id="comments" placeholder="Enter your comments" rows="4"></textarea>
      </div>

      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
