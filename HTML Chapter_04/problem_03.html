<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Form</title>
    <style>
        /* ========== Travel Form Styling ========== */

/* Reset default browser styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
}

/* Page background */
body {
  background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Form container */
form {
  background-color: #ffffff;
  width: 100%;
  max-width: 420px;
  padding: 30px 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

/* Heading */
h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #ffffff;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  font-size: 1.8rem;
}

/* Each input section */
form div {
  margin-bottom: 15px;
}

/* Labels */
label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  color: #333;
}

/* Inputs, selects, textarea */
input[type="text"],
input[type="number"],
textarea,
select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

/* Focus state */
input:focus,
textarea:focus,
select:focus {
  border-color: #4a6cf7;
  box-shadow: 0 0 6px rgba(74, 108, 247, 0.3);
}

/* Textarea */
textarea {
  resize: vertical;
  min-height: 70px;
}

/* Dropdown select */
select {
  background-color: #fff;
  cursor: pointer;
}

/* Checkbox */
input[type="checkbox"] {
  margin-right: 8px;
  transform: scale(1.1);
  cursor: pointer;
}

/* Submit button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #4a6cf7, #1dd1a1);
  border: none;
  color: white;
  font-size: 1.05rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.3s ease;
}

/* Button hover effect */
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
}

/* Checkbox + label alignment */
#terms + label {
  display: inline;
  font-size: 0.9rem;
  color: #444;
}

/* Responsive design */
@media (max-width: 480px) {
  form {
    padding: 20px 15px;
  }

  h1 {
    font-size: 1.5rem;
  }
}

    </style>
</head>
<body>
    
    <form action="">
        <div>
            <label for="name">Name</label>
            <input id="name"type="text" placeholder="Enter Your Name " required>
        </div>
        <div>
            <label for="age">Age</label>
            <input id="age"type="number" placeholder="Enter age" required>
        </div>
                <label for="gender"> Gender</label>
        <select name="gender" id="gender" required>
            <option value="disable">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="others">Others</option>
        </select>
        <div>
            <label for="mobile">Mobile</label>
            <input id="mobile" type="number" placeholder="Enter Mobile Number" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input id="email" type="text" placeholder="Enter Email" required>
        </div>
        <div>
            <label for="add">Address</label>
            <textarea name="Address" id="add"></textarea>
         
        </div>
        <div>
                 <label for="dest"> Destenation</label>
        <select name="dest" id="dest" required>
            <option value="disable">Select Destenation</option>
            <option value="thailand">Thailand</option>
            <option value="bali">Bali</option>
            <option value="europe">Europe</option>
            <option value="england">England</option>
        </select>
    
        </div>
     <div>
        <div>
        <input id="terms" type="checkbox" required>
        <label for="terms"> I agree to terms and condition</label>
    </div>
    <div>
        <button type="submit">Submit</button>
    </div>
    </form>

</body>
</html>
