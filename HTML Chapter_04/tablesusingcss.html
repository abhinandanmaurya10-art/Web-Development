<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables - HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        h2 {
            color: #222;
            margin-bottom: 20px;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: #fff;
        }

        thead {
            background-color: #0078d4;
            color: white;
        }

        thead td {
            font-weight: bold;
            text-transform: uppercase;
            padding: 15px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        tbody td {
            padding: 12px 15px;
            text-align: center;
          
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #dbeafe;
            transition: 0.3s ease;
        }

        table td {
            border-bottom: 1px solid #ddd;
            border: 2px solid black;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <h2>Tables in HTML</h2>
    <table>
        <thead>
            <tr>
                <td>Name</td>
                <td>Salary</td>
                <td>Roles</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Abhinandan Verma</td>
                <td>$5000</td>
                <td>Software Developer</td>
            </tr>
            <tr>
                <td>Vivek Verma</td>
                <td>$0</td>
                <td>Laundiabaj</td>
            </tr>
            <tr>
                <td>Ravi Verma</td>
                <td>$300</td>
                <td>Gamer</td>
            </tr>
            <tr>
                <td>Brijesh Yadav</td>
                <td>$4000</td>
                <td>Data Analyst</td>
            </tr>
             <tr>
                <td>Manoj Verma</td>
                <td>$7000</td>
                <td>Technical Analyst</td>
            </tr>
             <tr>
                <td>Thanks
                </td>
                <td> You</td>
               
            </tr>
        </tbody>
    </table>
</body>
</html>
