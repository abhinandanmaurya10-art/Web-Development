<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript & Superscript Example</title>
</head>
<body>
    <h2>SUBSCRIPT & SUPERSCRIPT</h2>
    <p>We can add subscript and superscript in HTML as follows:</p>
    <hr>

    This <sub>is</sub> subscript. <br>
    This <sup>is</sup> superscript. <br><br>

    <!-- Chemistry examples -->
    H<sub>2</sub>O <br>
    CO<sub>2</sub> <br>
    X<sup>2</sup> + Y<sup>2</sup> = Z<sup>2</sup>
</body>
</html>
