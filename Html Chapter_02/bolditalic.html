<body>
    <h2>BOLD, ITALIC AND UNDERLINE TAGS</h2>
    <h3>We can use bold, italic and underline tags to highlight the text as follows:</h3>
    <b> This is bold </b><br><!-- bold likhe ke liye -->
    <i>This is italic </i><br> <!-- italic likhne ke liye -->
    <u> This is underline </u><br> <!--Underline likhne ke liye -->

    <br>  The  tag is used to create New Line or Change Line 

</body>
