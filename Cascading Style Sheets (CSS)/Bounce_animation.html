<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 121px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: moveX 4s linear infinite,
            bounceY 0.8s ease-in-out infinite;

        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
            overflow: hidden;
           
        }

        /* Move to LAST CORNER */
 /* Left → Right → Left */
        @keyframes moveX {
            0%   { left: 0; }
            50%  { left: calc(100% - 121px); }
            100% { left: 0; }
        }

        /* Continuous bounce */
        @keyframes bounceY {
            0%   { bottom: 0; }
            50%  { bottom: 60%; }
            100% { bottom: 0; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
