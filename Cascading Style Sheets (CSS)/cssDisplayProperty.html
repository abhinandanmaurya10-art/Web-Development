<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid blue;
            display:inline-block;  /* display:inline karne se colour I am a box ke nichhe underline ho jayega. */
            /* we use display:inline-block;  to adjust widht */
            margin: 34px;  /* ab margin padding dono set ho jayegi */
            padding: 45px;
        }
        /* .box1{
             display: none;
            visibility: hidden;
        } */
    </style>
</head>

<body>
    <div class="box box1">
        I am a box
    </div>
    <div class="box">Also I am nice box </div>
    <span>I am a good</span>
    <span>Good</span>
</body>

</html>
