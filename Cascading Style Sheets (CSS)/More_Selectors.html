        .boxes::before {
            content: "I am a very good boy";
            color: aquamarine;
        }

        .boxes::after {
            content: "Sigma Web development course is very good";
            color: rgb(234, 30, 95);
        }

        ::selection{
            background-color: black;
            color: brown;
        }

        .box::first-letter{
            color: peru;
            font-size: 25px;
        }

        input::placeholder{
            background-color: white;
            color: blue;
        }
    </style>
</head>

<body>
    <div class="boxes">
        <div data-color="primary" class="box">Hey I am first Box</div>
        <div class="box">Hey I am a Box</div>
        <div class="box">Hey I am a Box</div>
        <input type="text" placeholder="type your name">
    </div>
