<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraEdit Clone</title>

<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔶 Top Banner */
.top-banner{
    background: #f4c542;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* 🔷 Navbar */
nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    border-bottom: 1px solid #ddd;
}

.logo{
    font-weight: bold;
    font-size: 20px;
}

.nav-links{
    display: flex;
    gap: 20px;
}

.nav-links li{
    list-style: none;
    cursor: pointer;
}

/* Buttons */
.download-btn{
    background: #f4c542;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

/* 🔥 Hero Section */
.hero{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
}

.hero-text{
    max-width: 50%;
}

.hero-text h1{
    font-size: 45px;
}

.hero-text p{
    color: #555;
    margin: 20px 0;
}

.buttons{
    display: flex;
    gap: 15px;
}

.btn-yellow{
    background: #f4c542;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}

.btn-gray{
    background: #ddd;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}

/* Image */
.hero img{
    width: 500px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🔶 Banner -->
<div class="top-banner">
    End of Fiscal Year Sale: 20% OFF
</div>

<!-- 🔷 Navbar -->
<nav>
    <div class="logo"><img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo-1.png" alt=""></div>

    <ul class="nav-links">
        <li>Products</li>
        <li>Pricing</li>
        <li>Resources</li>
        <li>Company</li>
    </ul>

    <button class="download-btn">Download</button>
</nav>

<!-- 🔥 Hero Section -->
<section class="hero">
    
    <div class="hero-text">
        <h1>The modern text editor built for huge files.</h1>

        <p>
            UltraEdit is a high-performance text editor used by professionals.
        </p>

        <div class="buttons">
            <button class="btn-yellow">Compare Plans</button>
            <button class="btn-gray">Free Trial</button>
        </div>
    </div>

    <div>
        <img src="https://via.placeholder.com/500x300" alt="editor">
    </div>

</section>

</body>
</html>
