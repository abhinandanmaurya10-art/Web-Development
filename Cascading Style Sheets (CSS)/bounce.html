<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
         .box{
            background-color: red;
            position: absolute;
            border-radius: 121px;
            height: 121px;
            width: 121px;
            animation: moveX 3s linear infinite , moveY 1s ease-out infinite alternate;

        }
        .container{
            width: 80vw;
            height: 80vh;
            background-color: blue;
            position: relative;

        }
        @keyframes moveX{
            from{

            left: 0;
            }
            to{
                left: 100%;

            }
            
        }
        @keyframes moveY {
            from{
             bottom: 0;

            }
            to{
              bottom: 100%;
            }
        }
       
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
