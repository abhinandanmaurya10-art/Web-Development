<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>

    <style>
        /* .img{ */
        /*  filter: blur(10px); */
        /*  filter: brightness(100px); */
        /* } */

        .img1 {
            
        filter: brightness(122%);

        }

        .img2 {
        filter: grayscale(100%);
        }

        /* filter-function> values */
        /* These are some filters use in the css  */
        /*   filter: blur(5px);
             filter: brightness(0.4);
             filter: contrast(200%);

             filter: hue-rotate(90deg);
             filter: invert(75%);
             filter: opacity(25%);
             filter: saturate(30%);
             filter: sepia(60%); */
    </style>
</head>

<body>
    <div class="container">
        <img class="img1"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPBza7kL7W70U-6GGdoLV24i1UrCjD7OSh2Q&s" alt="">
        <img class="img2"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpZGj6J1IFcO-qYZLhAjgwtcAF6noZSeKpCA&s" alt="">

</html>
