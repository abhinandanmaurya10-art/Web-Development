<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
</head>

<body>
    <Header>
        <!-- Header part web page ke top par hota hai.
        Isme usually ye cheezein hoti hain:

        Website ka logo

        Navigation menu (home, about, contact links)

        Title ya heading Example-->
        <h1>My Website</h1>
        <nav>
            <a href="/home">Home</a> 
            <a href="about.html">About</a> 
            <a href="https://www.instagram.com/abhinandanmaurya10/" target="_blank">My instagram</a>  <!--target="_blank" dusare tag me open karne ke liye lgate hai-->

        </nav>
    </Header>

    <main>
        <!-- Main tag page ke beech wala portion hota hai — -->
        <!-- jisme actual content hota hai (jaise article, image, form, etc). -->
        <!-- Iske andar header ya footer nahi hona chahiye. Example-->
        <h2>Welcome to my page</h2>
        <p>
            This is the main section where main content appears.
        </p>
    </main>

    <footer>
        <!-- Footer page ke neeche hota hai.
        Isme usually likha hota hai:

        Copyright info

        Contact details

        Social media links Example -->
        <p>
            &copy; 2025 My Website. All Rights Reserved.
        </p>
    </footer>
</body>

</html>
