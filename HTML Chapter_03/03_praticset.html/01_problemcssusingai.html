<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy - Food delivery at your doorstep</title>
    <style>
        /* ===== Global Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        /* ===== Body ===== */
        body {
            background-color: #fff7f0;
            color: #333;
            line-height: 1.6;
        }

        /* ===== Header ===== */
        header {
            background-color: #ff6600;
            /* Bright orange theme */
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3);
        }

        header div:first-child {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        header a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        header a:hover {
            color: #ffe5cc;
            border-bottom: 2px solid #ffe5cc;
        }

        /* ===== Main Section ===== */
        main {
            text-align: center;
            padding: 100px 20px;
            background-color: #fffaf5;
            min-height: 70vh;
        }

        main div {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6600;
            margin-bottom: 20px;
        }

        main p {
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: #444;
        }

        /* ===== Footer ===== */
        footer {
            background-color: #ff6600;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            box-shadow: 0 -2px 8px rgba(255, 102, 0, 0.3);
        }
    </style>
</head>

        </div>

</html>
